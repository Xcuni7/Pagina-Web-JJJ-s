<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión</title>
    <link rel="stylesheet" href="Iniciar_sesion.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <h1 id="form-title">Iniciar Sesión</h1>
        </header>
        
        <div class="login-container" id="login-container">
            <form id="loginForm">
                <label for="email">Correo electrónico:</label>
                <input type="email" id="login-email" name="email" placeholder="Correo electrónico" required>

                <label for="password">Contraseña:</label>
                <input type="password" id="login-password" name="password" placeholder="Contraseña" required>

                <div class="button-container">
                    <button type="submit" class="boton-iniciar-sesion">Iniciar sesión</button>
                    <button type="button" class="boton-volver" onclick="window.location.href='Paginaweb.html'">Volver</button>
                </div>
            </form>
            <div id="message"></div>
            <p>¿No tienes una cuenta? <a href="#" id="show-register">Regístrate aquí</a></p>
        </div>

        <div class="login-container" id="register-container" style="display: none;">
            <form id="registerForm">
                <label for="account-name">Nombre de la cuenta:</label>
                <input type="text" id="account-name" name="account-name" placeholder="Nombre de la cuenta" required>

                <label for="reg-email">Correo electrónico:</label>
                <input type="email" id="reg-email" name="email" placeholder="Correo electrónico" required>

                <label for="reg-password">Contraseña:</label>
                <input type="password" id="reg-password" name="password" placeholder="Contraseña" required>

                <div class="button-container">
                    <button type="submit" class="boton-iniciar-sesion">Crear cuenta</button>
                    <button type="button" class="boton-volver" id="cancel-register">Cancelar</button>
                </div>
            </form>
            <div id="register-message"></div>
        </div>
    </div>
    
    <script>
        // Almacenamiento local para simular una base de datos
        const usersDB = JSON.parse(localStorage.getItem('usersDB')) || {};

        // Validar el formato del correo electrónico
        function isValidEmail(email) {
            const regex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            return regex.test(email);
        }

        // Iniciar sesión
        document.getElementById('loginForm').addEventListener('submit', function(event) {
            event.preventDefault(); // Evitar el envío del formulario

            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;

            // Verificar las credenciales
            if (usersDB[email] && usersDB[email].password === password) {
                // Guardar el correo electrónico del usuario conectado
                localStorage.setItem('loggedInUser', email);
                window.location.href = 'Paginaweb.html'; // Redirigir a la página principal
            } else {
                document.getElementById('message').innerText = 'Correo electrónico o contraseña incorrectos.';
                document.getElementById('message').style.color = 'red';
            }
        });

        // Registro de usuarios
        document.getElementById('registerForm').addEventListener('submit', function(event) {
            event.preventDefault(); // Evitar el envío del formulario

            const accountName = document.getElementById('account-name').value;
            const regEmail = document.getElementById('reg-email').value;
            const regPassword = document.getElementById('reg-password').value;

            // Validar el correo electrónico
            if (!isValidEmail(regEmail)) {
                document.getElementById('register-message').innerText = 'Por favor, introduce un correo electrónico válido.';
                document.getElementById('register-message').style.color = 'red';
                return;
            }

            // Verificar si el usuario ya existe
            if (usersDB[regEmail]) {
                document.getElementById('register-message').innerText = 'Este correo ya está registrado.';
                document.getElementById('register-message').style.color = 'red';
                return;
            }

            // Guardar el nuevo usuario
            usersDB[regEmail] = {
                password: regPassword,
                accountName: accountName
            };
            localStorage.setItem('usersDB', JSON.stringify(usersDB)); // Guardar en localStorage
            document.getElementById('register-message').innerText = 'Cuenta creada exitosamente!';
            document.getElementById('register-message').style.color = 'green';

            // Reiniciar el formulario
            document.getElementById('registerForm').reset();
        });

        // Mostrar formulario de registro
        document.getElementById('show-register').addEventListener('click', function() {
            document.getElementById('login-container').style.display = 'none';
            document.getElementById('register-container').style.display = 'block';
            document.getElementById('form-title').innerText = 'Registro de Cuenta';
        });

        // Cancelar registro
        document.getElementById('cancel-register').addEventListener('click', function() {
            document.getElementById('register-container').style.display = 'none';
            document.getElementById('login-container').style.display = 'block';
            document.getElementById('form-title').innerText = 'Iniciar Sesión';
            document.getElementById('register-message').innerText = ''; // Limpiar el mensaje al volver
        });
    </script>
</body>
</html>
