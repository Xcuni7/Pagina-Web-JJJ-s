<!DOCTYPE html> 
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inicio Sesión</title>
    <link rel="icon" href="Imagenes/Logo Restaurante.PNG">
    <link rel="stylesheet" href="InicioSs.css">
    <style>
        /* Opcional: estilos para los mensajes de error */
        .error {
            color: red;
            font-size: 0.9rem;
            margin-top: 5px;
            display: none;
        }

        .toggle-link {
            color: white;
            font-weight: bold;
            font-size: 0.9rem;
            margin-top: 15px;
        }

        /* Estilo específico para los enlaces "Crea una cuenta" y "Inicia sesión" */
        .toggle-link span {
            color: #007bff; /* Azul */
            position: relative;
            cursor: pointer;
        }

        /* Línea inferior con animación */
        .toggle-link span::after {
            content: "";
            position: absolute;
            width: 100%;
            height: 2px;
            background-color: #007bff8e;
            bottom: -2px;
            left: 0;
            transform: scaleX(0);
            transform-origin: left;
            transition: transform 0.3s ease;
        }

        /* Animación al pasar el cursor */
        .toggle-link span:hover::after {
            transform: scaleX(1);
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>

    <a href="javascript:history.back()" class="back-button">
        <img src="Imagenes/VOLVER.png" alt="Regresar" />
    </a>    

    <div class="wrapper">
        <!-- Formulario de inicio de sesión -->
        <form id="loginForm" class="active">
            <h2>Inicia Sesión</h2>

            <div class="input-field">
                <input type="email" id="email" required>
                <label for="email">Escribe tu email</label>
                <p class="error" id="emailError">Por favor, introduce un correo válido.</p>
            </div>

            <div class="input-field">
                <input type="password" id="password" required minlength="6">
                <label for="password">Escribe tu contraseña</label>
                <p class="error" id="passwordError">La contraseña debe tener al menos 6 caracteres.</p>
            </div>

            <div class="forget">
                <label for="remember">
                    <input type="checkbox" id="remember">
                    <p>Recordar</p>
                </label>
                <a href="#">¿Olvidó su contraseña?</a>
            </div>

            <button type="submit">Entrar</button>

            <!-- Botones de inicio de sesión con Google y Facebook -->
            <div class="social-buttons">
                <button type="button" class="google-button">
                    <img src="Imagenes/Google.png" alt="Google" class="social-icon"> Iniciar sesión con Google
                </button>
                <button type="button" class="facebook-button">
                    <img src="Imagenes/Facebook.png" alt="Facebook" class="social-icon"> Iniciar sesión con Facebook
                </button>
            </div>

            <p class="toggle-link" id="registerPrompt">¿No tienes cuenta? <span id="registerLink">Crea una cuenta</span></p>
        </form>

        <!-- Formulario de registro -->
        <form id="registerForm" class="hidden">
            <h2>Crear Cuenta</h2>

            <div class="input-field">
                <input type="text" id="nombre" required>
                <label for="nombre">Nombre</label>
            </div>
            <div class="input-field">
                <input type="text" id="celular" required>
                <label for="celular">Número de Celular</label>
            </div>
            <div class="input-field">
                <input type="email" id="correo" required>
                <label for="correo">Correo Electrónico</label>
                <p class="error" id="correoError">Por favor, introduce un correo válido.</p>
            </div>
            <div class="input-field">
                <input type="password" id="contrasena" required minlength="6">
                <label for="contrasena">Contraseña</label>
                <p class="error" id="contrasenaError">La contraseña debe tener al menos 6 caracteres.</p>
            </div>

            <button type="submit">Crear Cuenta</button>
            <p class="toggle-link" id="loginPrompt">¿Ya tienes cuenta? <span id="loginLink">Inicia sesión</span></p>
        </form>
    </div>

    <script src="script.js"></script>
</body>
</html>
