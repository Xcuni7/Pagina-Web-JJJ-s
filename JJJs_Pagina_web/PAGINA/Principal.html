<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JJJ´s FOOD</title>
    <link rel="icon" href="Imagenes/Logo Restaurante.PNG">
    <link rel="stylesheet" href="Principal.css">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
</head>
<body>
    <div class="sidebar">
        <div class="logo_content">
            <div class="logo">
                <img src="Imagenes/Logo Restaurante.PNG" alt="Logo del Restaurante" width="53" height="50">
                <div class="logo_name">JJJ´s Food</div>
            </div>
            <i class='bx bx-menu' id='btn'></i>
        </div>

        <div class="src">
            <i class='bx bx-search-alt'></i>
            <input type="text" placeholder="Buscar...">
        </div>

        <ul class="nav">
            <li>
                <a href="InicioSs.html">
                    <i class='bx bx-extension'></i>
                     <span class="link_name">Inicia sesión</span>
                </a>
                <span class="tooltip">Inicia sesión</span>
            </li> 
            <li>
                <a href="#">
                    <i class='bx bx-basket'></i>
                     <span class="link_name">Productos</span>
                </a>
                <span class="tooltip">Productos</span>
            </li> 
            <li>
                <a href="#">
                    <i class='bx bx-package'></i>
                     <span class="link_name">Pedidos</span>
                </a>
                <span class="tooltip">Pedidos</span>
            </li> 
            <li>
                <a href="#">
                    <i class='bx bxs-dish'></i>
                     <span class="link_name">Nosotros</span>
                </a>
                <span class="tooltip">Nosotros</span>
            </li> 
            <li>
                <a href="Horarios.html">
                    <i class='bx bx-calendar-edit'></i>
                     <span class="link_name">Horarios</span>
                </a>
                <span class="tooltip">Horarios</span>
            </li> 
        </ul>
    </div>

    <div class="home_content">
        <div class="text">Bienvenido 👋👋</div>
    </div>

    <script>
        let btn = document.querySelector('#btn');
        let sidebar = document.querySelector('.sidebar');
        let srcBtn = document.querySelector('.bx-search');

        btn.onclick = function(){
            sidebar.classList.toggle('active');
        }
        srcBtn.onclick = function(){
            sidebar.classList.toggle('active');
        }
    </script>
</body>
</html>
